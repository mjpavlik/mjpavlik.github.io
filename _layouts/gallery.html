---
layout: default
---

<div class="gallery">
  {% for image in site.static_files %}
    {% if image.path contains 'gallery_images/' %}
      <div class="gallery-item">
        <img src="{{ site.baseurl }}{{ image.path }}" alt="{{ image.name | remove: '.png' | replace: '_', ' ' }}" />
      </div>
    {% endif %}
  {% endfor %}
</div>
